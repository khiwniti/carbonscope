    <style>
      body {
        font-family: 'Sarabun', sans-serif;
        background-color: #111827; /* Dark background for desktop "mobile" feel */
        -webkit-tap-highlight-color: transparent;
        /* Prevent text selection to feel like an app */
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior-y: none;
      }
      
      /* Allow text selection on specific content if needed */
      .selectable {
        -webkit-user-select: text;
        user-select: text;
      }

      /* Safe Area Utilities for modern phones */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 20px);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top, 20px);
      }
      .mb-safe {
        margin-bottom: env(safe-area-inset-bottom, 20px);
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up {
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes bounceSmall {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .animate-bounce-small {
        animation: bounceSmall 0.3s ease-in-out;
      }
      
      @keyframes scan {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      .scan-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 3px;
        background: #4ade80; /* green-400 */
        box-shadow: 0 0 15px #22c55e, 0 0 30px #22c55e;
        animation: scan 2s linear infinite;
        z-index: 10;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      
      /* Leaflet Z-Index fix for bottom nav */
      .leaflet-bottom {
        bottom: 120px !important;
      }
    </style>
