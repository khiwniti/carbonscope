apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: carbonscope
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: frontend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: carbonscope
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: backend
