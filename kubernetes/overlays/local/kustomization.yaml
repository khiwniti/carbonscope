apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: carbonscope

resources:
  - ../../base

namePrefix: local-

labels:
  - pairs:
      environment: local

patches:
  # Reduce replicas for local development
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Use smaller resource limits for local
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"

  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"

configMapGenerator:
  - name: frontend-config
    behavior: merge
    literals:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000/v1

  - name: backend-config
    behavior: merge
    literals:
      - LOG_LEVEL=debug

images:
  - name: carbonscopeacr.azurecr.io/suna-frontend
    newTag: latest
  - name: carbonscopeacr.azurecr.io/suna-backend
    newTag: latest
