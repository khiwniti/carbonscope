apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: carbonscope

resources:
  - ../../base
  - ../../configs/secrets.yaml

namePrefix: local-

labels:
  - pairs:
      environment: local

patches:
  # Scale down to 1 replica for local dev
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Local resource limits
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1.5Gi"

  # imagePullPolicy for local images
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent

  # Add imagePullSecrets for ACR
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: acr-secret

configMapGenerator:
  - name: frontend-config
    behavior: merge
    literals:
      - NEXT_PUBLIC_BACKEND_URL=http://local-backend/v1
      - NEXT_PUBLIC_APP_URL=http://carbonscope.local

  - name: backend-config
    behavior: merge
    literals:
      - ENV_MODE=local
      - LOG_LEVEL=debug
      - DISABLE_BILLING=true
      - CLOUDWATCH_LOGGING_ENABLED=false
      - WORKERS=2

images:
  - name: carbonscopeacr.azurecr.io/suna-frontend
    newTag: v1.0.9
  - name: carbonscopeacr.azurecr.io/suna-backend
    newTag: v2.0.9
