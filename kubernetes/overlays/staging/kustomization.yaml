apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: carbonscope

bases:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

patches:
  # Use 2 replicas for staging
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # Adjust HPA for staging
  - target:
      kind: HorizontalPodAutoscaler
      name: frontend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5

  - target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5

configMapGenerator:
  - name: frontend-config
    behavior: merge
    literals:
      - NEXT_PUBLIC_BACKEND_URL=https://staging-backend.carbonscope.com/v1

images:
  - name: carbonscopeacr.azurecr.io/suna-frontend
    newTag: staging
  - name: carbonscopeacr.azurecr.io/suna-backend
    newTag: staging
