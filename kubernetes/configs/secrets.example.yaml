# Example secrets file - DO NOT COMMIT REAL SECRETS
# Copy this file to secrets.yaml and update with real values
# Add secrets.yaml to .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: frontend-secrets
  namespace: carbonscope
type: Opaque
stringData:
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "your-supabase-anon-key-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: carbonscope
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/carbonscope"
  SUPABASE_KEY: "your-supabase-service-role-key-here"
  ANTHROPIC_API_KEY: "your-anthropic-api-key-here"
  DAYTONA_API_KEY: "your-daytona-api-key-here"
  COMPOSIO_API_KEY: "your-composio-api-key-here"
  TAVILY_API_KEY: "your-tavily-api-key-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: carbonscope
type: Opaque
stringData:
  POSTGRES_USER: "carbonscope"
  POSTGRES_PASSWORD: "change-me-in-production"
